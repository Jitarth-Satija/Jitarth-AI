<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">

    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        h2 { color: #333; }
        .social-links { margin-top: 20px; }
        .social-links a { text-decoration: none; font-size: 40px; margin: 0 15px; transition: 0.3s; }
        
        /* Icons ke colors */
        .fa-instagram { color: #E1306C; }
        .fa-youtube { color: #FF0000; }
        .fa-envelope { color: #D44638; }
        
        .social-links a:hover { opacity: 0.7; transform: scale(1.1); display: inline-block; }
        p { margin-top: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Connect With Me</h2>
    <p>Click on the icons to visit my profiles:</p>
    
    <div class="social-links">
        <a href="https://instagram.com/jitarths_2013_js" target="_blank" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://youtube.com/@jitarth_ai?si=CTUdVlE8cIHF_B-y" target="_blank" title="YouTube">
            <i class="fab fa-youtube"></i>
        </a>

        <a href="mailto:jitarth.ai2013@gmail.com" title="Email Me">

</div>
